<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Knowledge Trainer — Chat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f3;
      color: #1a1a18;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px;
    }

    .header {
      width: 100%;
      max-width: 680px;
      margin-bottom: 16px;
    }

    .header h1 {
      font-size: 18px;
      font-weight: 500;
      color: #1a1a18;
    }

    .header p {
      font-size: 13px;
      color: #73726c;
      margin-top: 4px;
    }

    .model-badge {
      display: inline-block;
      font-size: 11px;
      background: #eeedfe;
      color: #3c3489;
      border: 0.5px solid #afa9ec;
      border-radius: 6px;
      padding: 3px 8px;
      margin-top: 6px;
    }

    .chat-window {
      width: 100%;
      max-width: 680px;
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 16px 0;
      min-height: 0;
    }

    .message {
      display: flex;
      flex-direction: column;
      max-width: 85%;
    }

    .message.user  { align-self: flex-end;   align-items: flex-end;   }
    .message.model { align-self: flex-start; align-items: flex-start; }

    .bubble {
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.5;
      border: 0.5px solid transparent;
    }

    .user .bubble {
      background: #1a1a18;
      color: #f5f5f3;
      border-color: #1a1a18;
    }

    .model .bubble {
      background: #fff;
      color: #1a1a18;
      border-color: #e0dfd8;
    }

    .model .bubble .main-answer {
      font-weight: 500;
      margin-bottom: 6px;
    }

    .model .bubble .context-snippet {
      font-size: 12px;
      color: #73726c;
      border-top: 0.5px solid #e0dfd8;
      padding-top: 6px;
      margin-top: 6px;
      font-style: italic;
      line-height: 1.6;
    }

    .model .bubble .context-label {
      font-size: 11px;
      color: #b4b2a9;
      font-style: normal;
      font-weight: 500;
      margin-bottom: 3px;
    }

    .sender-label {
      font-size: 11px;
      color: #73726c;
      margin-bottom: 3px;
      padding: 0 4px;
    }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: #73726c;
      font-size: 14px;
    }

    .empty-state .hint {
      font-size: 13px;
      color: #b4b2a9;
    }

    .input-row {
      width: 100%;
      max-width: 680px;
      display: flex;
      gap: 8px;
      padding-top: 12px;
      border-top: 0.5px solid #e0dfd8;
    }

    input[type="text"] {
      flex: 1;
      padding: 10px 14px;
      font-size: 14px;
      border: 0.5px solid #d3d1c7;
      border-radius: 8px;
      background: #fff;
      color: #1a1a18;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="text"]:focus { border-color: #888780; }

    button {
      padding: 10px 18px;
      background: #1a1a18;
      color: #f5f5f3;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      transition: opacity 0.15s;
      white-space: nowrap;
    }

    button:hover { opacity: 0.85; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    .thinking {
      display: flex;
      gap: 4px;
      padding: 10px 14px;
      background: #fff;
      border: 0.5px solid #e0dfd8;
      border-radius: 12px;
      align-self: flex-start;
    }

    .dot {
      width: 6px; height: 6px;
      background: #b4b2a9;
      border-radius: 50%;
      animation: bounce 1s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.15s; }
    .dot:nth-child(3) { animation-delay: 0.3s; }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-4px); }
    }
  </style>
</head>
<body>

<div class="header">
  <h1>Knowledge Trainer</h1>
  <p>Ask the model what it has learned from the Wikipedia pages you fed it.</p>
  <span class="model-badge" id="model-badge">loading model info...</span>
</div>

<div class="chat-window" id="chat">
  <div class="empty-state" id="empty-state">
    <span>Ask the model anything</span>
    <span class="hint">It will answer based on what it was trained on</span>
  </div>
</div>

<div class="input-row">
  <input
    type="text"
    id="input"
    placeholder="Ask a question..."
    autocomplete="off"
    onkeydown="if(event.key==='Enter') send()"
  />
  <button onclick="send()" id="send-btn">Ask</button>
</div>

<script>
  const API = "http://localhost:8000";

  async function loadHealth() {
    try {
      const res  = await fetch(`${API}/health`);
      const data = await res.json();
      const dir  = data.model_dir.split(/[\\/]/).slice(-2).join("/");
      const pages = data.pages_loaded && data.pages_loaded.length
        ? " · " + data.pages_loaded.join(", ")
        : "";
      document.getElementById("model-badge").textContent = "Model: " + dir + pages;
    } catch {
      document.getElementById("model-badge").textContent = "server not running";
    }
  }

  function addMessage(role, content) {
    const empty = document.getElementById("empty-state");
    if (empty) empty.remove();

    const chat    = document.getElementById("chat");
    const wrapper = document.createElement("div");
    wrapper.className = `message ${role}`;

    const label  = document.createElement("div");
    label.className = "sender-label";
    label.textContent = role === "user" ? "You" : "Model";

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.innerHTML = content;

    wrapper.appendChild(label);
    wrapper.appendChild(bubble);
    chat.appendChild(wrapper);
    chat.scrollTop = chat.scrollHeight;
    return wrapper;
  }

  function addThinking() {
    const chat = document.getElementById("chat");
    const div  = document.createElement("div");
    div.className = "thinking";
    div.id = "thinking";
    div.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  function removeThinking() {
    const t = document.getElementById("thinking");
    if (t) t.remove();
  }

  async function send() {
    const input = document.getElementById("input");
    const btn   = document.getElementById("send-btn");
    const q     = input.value.trim();
    if (!q) return;

    input.value  = "";
    btn.disabled = true;

    addMessage("user", q);
    addThinking();

    try {
      const res  = await fetch(`${API}/ask`, {
        method:  "POST",
        headers: { "Content-Type": "application/json" },
        body:    JSON.stringify({ question: q }),
      });
      const data = await res.json();
      removeThinking();

      // Build response HTML — answer + context snippet
      const answer  = data.answer || "[no answer]";
      const context = data.context || "";

      const contextHtml = context
        ? `<div class="context-snippet">
             <div class="context-label">from context</div>
             ${context.replace(/</g, "&lt;")}
           </div>`
        : "";

      const html = `
        <div class="main-answer">${answer}</div>
        ${contextHtml}
      `;

      addMessage("model", html);

    } catch (err) {
      removeThinking();
      addMessage("model", "Could not reach the model server. Is serve.py running?");
    }

    btn.disabled = false;
    input.focus();
  }

  loadHealth();
</script>
</body>
</html>
